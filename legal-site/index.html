<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinna — Legal</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #fff;
  }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', Courier, monospace;
    padding: 24px;
  }
  .wrap {
    width: 100%;
    max-width: 700px;
    text-align: center;
  }
  h1 {
    font-size: 32px;
    letter-spacing: 4px;
    margin: 0 0 8px;
    font-weight: 400;
  }
  .tagline {
    color: rgba(255,255,255,0.35);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin: 0 0 56px;
  }
  .rule {
    width: 40px;
    height: 1px;
    background: rgba(255,255,255,0.25);
    margin: 0 auto 56px;
  }
  nav {
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
  }
  a.link {
    display: block;
    width: 100%;
    max-width: 340px;
    padding: 18px 20px;
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.75);
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
  }
  a.link:hover {
    border-color: #fff;
    color: #fff;
    background: rgba(255,255,255,0.04);
  }
  footer {
    margin-top: 64px;
    color: rgba(255,255,255,0.25);
    font-size: 10px;
    letter-spacing: 1px;
  }
  @media (max-width: 480px) {
    h1 { font-size: 24px; letter-spacing: 3px; }
    a.link { padding: 16px; font-size: 11px; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <h1>CLINNA</h1>
    <p class="tagline">Archive Fashion Authentication</p>
    <div class="rule"></div>
    <nav>
      <a class="link" href="privacy.html">[ Privacy Policy ]</a>
      <a class="link" href="terms.html">[ Terms of Service ]</a>
    </nav>
    <footer>&copy; 2026 Clinna &middot; Operated by Naci Çelik, Türkiye</footer>
  </div>
</body>
</html>
