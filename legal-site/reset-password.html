<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinna — Reset Password</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #000; color: #fff; }
  body {
    font-family: 'Courier New', Courier, monospace;
    max-width: 460px;
    margin: 0 auto;
    padding: 56px 20px 100px;
    line-height: 1.65;
    font-size: 15px;
    color: rgba(255,255,255,0.8);
  }
  a.back {
    display: inline-block;
    margin-bottom: 48px;
    color: rgba(255,255,255,0.4);
    text-decoration: none;
    letter-spacing: 2px;
    font-size: 11px;
    text-transform: uppercase;
  }
  a.back:hover { color: #fff; }
  h1 {
    font-size: 24px;
    letter-spacing: 2px;
    color: #fff;
    font-weight: 400;
    margin: 0 0 8px;
  }
  .meta {
    color: rgba(255,255,255,0.35);
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 40px;
  }
  .intro {
    color: rgba(255,255,255,0.7);
    margin-bottom: 32px;
    padding-bottom: 32px;
    border-bottom: 1px solid rgba(255,255,255,0.12);
  }
  label {
    display: block;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 8px;
  }
  input[type="password"] {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    font-family: 'Courier New', Courier, monospace;
    font-size: 16px;
    padding: 10px 0;
    margin-bottom: 24px;
    outline: none;
  }
  input[type="password"]:focus { border-bottom-color: #fff; }
  button {
    width: 100%;
    background: #fff;
    color: #000;
    border: none;
    padding: 16px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
  }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .msg {
    margin-top: 24px;
    font-size: 12px;
    letter-spacing: 1.5px;
    line-height: 18px;
  }
  .msg.error { color: #ff5555; }
  .msg.info  { color: rgba(255,255,255,0.6); }
  .msg.success { color: #fff; }
  hr {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.12);
    margin: 40px 0;
  }
  @media (max-width: 480px) {
    body { font-size: 14px; padding: 40px 16px 72px; }
    h1 { font-size: 20px; }
  }
</style>
</head>
<body>
  <a class="back" href="index.html">&larr; Back</a>

  <h1>Reset Password</h1>
  <p class="meta">Clinna</p>

  <p class="intro" id="intro">
    Enter a new password for your Clinna account.
  </p>

  <form id="resetForm">
    <label for="pw1">New Password</label>
    <input type="password" id="pw1" autocomplete="new-password" placeholder="••••••••">

    <label for="pw2">Confirm Password</label>
    <input type="password" id="pw2" autocomplete="new-password" placeholder="••••••••">

    <button type="submit" id="submitBtn">[ Set New Password ]</button>
  </form>

  <div class="msg" id="msg"></div>

  <hr>
  <a class="back" href="index.html">&larr; Back</a>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    // Public anon key — safe to expose client-side, protected by Supabase RLS.
    const SUPABASE_URL = 'https://elayyixoxfdtvnmkjaep.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVsYXl5aXhveGZkdHZubWtqYWVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3NzE4MTgsImV4cCI6MjA5OTM0NzgxOH0.7_hYAYQwrsOvtLXMvzw20xLJxyVIN9tnH4PC3PD19w4';

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById('resetForm');
    const pw1 = document.getElementById('pw1');
    const pw2 = document.getElementById('pw2');
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('msg');
    const intro = document.getElementById('intro');

    let recoveryReady = false;

    function showMsg(text, type) {
      msg.textContent = text;
      msg.className = 'msg ' + type;
    }

    // Supabase processes the recovery token from the URL fragment on client
    // creation and fires PASSWORD_RECOVERY once the session is established.
    client.auth.onAuthStateChange((event) => {
      if (event === 'PASSWORD_RECOVERY') {
        recoveryReady = true;
      }
    });

    // Fallback: if the event already fired before the listener attached,
    // a valid session means the recovery link was accepted.
    client.auth.getSession().then(({ data }) => {
      if (data.session) recoveryReady = true;
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      showMsg('', '');

      if (!recoveryReady) {
        showMsg('This reset link is invalid or has expired. Request a new one from the app.', 'error');
        return;
      }
      if (!pw1.value || !pw2.value) {
        showMsg('Enter and confirm your new password.', 'error');
        return;
      }
      if (pw1.value !== pw2.value) {
        showMsg('Passwords do not match.', 'error');
        return;
      }
      const hasLetter = /[a-zA-Z]/.test(pw1.value);
      const hasNumber = /[0-9]/.test(pw1.value);
      if (!hasLetter || !hasNumber) {
        showMsg('Password must contain at least one letter and one number.', 'error');
        return;
      }

      btn.disabled = true;
      showMsg('Updating...', 'info');

      const { error } = await client.auth.updateUser({ password: pw1.value });

      if (error) {
        showMsg('Could not update password. Request a new reset link and try again.', 'error');
        btn.disabled = false;
        return;
      }

      form.style.display = 'none';
      intro.textContent = 'Your password has been updated.';
      showMsg('[ PASSWORD UPDATED ] — return to the Clinna app and sign in with your new password.', 'success');
    });
  </script>
</body>
</html>
